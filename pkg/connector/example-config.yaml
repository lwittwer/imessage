# Display name template for iMessage contacts.
# Available variables: {{.FirstName}}, {{.LastName}}, {{.Nickname}},
# {{.Phone}}, {{.Email}}, {{.ID}}
displayname_template: "{{if .FirstName}}{{.FirstName}}{{if .LastName}} {{.LastName}}{{end}}{{else if .Nickname}}{{.Nickname}}{{else if .Phone}}{{.Phone}}{{else if .Email}}{{.Email}}{{else}}{{.ID}}{{end}}"

# Enable CloudKit message history backfill.
# When true, the bridge will sync past messages from iCloud during setup.
# Requires entering your device PIN during login to join the iCloud Keychain.
# When false (default), only real-time messages are bridged — no PIN needed.
cloudkit_backfill: false

# Backfill source: "cloudkit" (default) syncs from iCloud.
# "chatdb" reads the local macOS chat.db (requires Full Disk Access).
backfill_source: cloudkit

# Enable automatic video transcoding/remuxing of non-MP4 videos (e.g.
# QuickTime .mov) to MP4 for broad Matrix client compatibility.
# Requires ffmpeg to be installed on the system.
video_transcoding: false

# Enable automatic HEIC/HEIF to JPEG conversion for broad Matrix client
# compatibility. Requires libheif to be installed on the system.
heic_conversion: false

# JPEG output quality for HEIC/HEIF conversion (1–100). Default is 95.
heic_jpeg_quality: 95

# Fetch link previews (og:/twitter: tags + thumbnail) for URL-bearing
# messages during backfill. Each URL triggers up to three HTTP round-trips
# (homeserver preview, page fetch, image download + re-upload) inline with
# conversion — on a slow uplink this dominates backfill time. Set to false
# to skip previews during backfill only; live inbound messages and outbound
# edits still build previews normally.
url_previews_in_backfill: true

# Override the outgoing iMessage identity (what recipients see your messages "from").
# Use the full URI format: "tel:+15551234567" or "mailto:user@example.com".
# Leave empty to use the handle chosen during login.
# Available handles are logged on startup.
preferred_handle: ""

# Override the display name pre-filled on the FaceTime web join page (the
# `#n=…` fragment in the ring-notice link). If empty, the bridge reads
# "First Last" from the Apple Account SPD; if that's also blank it falls
# back to the bare iMessage handle (e.g. "+15551234567").
facetime_display_name: ""

# Disable bridge FaceTime integration. When true, !facetime* commands aren't
# registered and inbound ring / missed / answered-elsewhere / peer-invite
# notices are suppressed. Intended for users with their own Apple device who
# answer FaceTime natively — the bridge wrapper adds nothing in that case.
disable_facetime: false

# Publish "available" to StatusKit once after startup. Peer iOS reciprocates
# with a reshare, which is what gives the bridge the keys needed to decrypt
# contacts' Focus/DND presence. Leaving this on dramatically improves the
# chance of seeing others' Focus state in Matrix. Set to false to opt out.
statuskit_share_on_startup: true

# StatusKit notifications surface iOS 18 Focus / Do Not Disturb state
# changes from your contacts inline in the relevant DM portal. When a
# contact enables DND on their iPhone, a silent m.notice appears in the
# DM ("🔕 Name has notifications silenced (Do Not Disturb).") plus a
# Matrix ghost presence update, and clears when they turn it off — the
# same affordance Apple's Messages app shows in-conversation. Set this
# to false to suppress the notices and presence updates while leaving
# StatusKit registration / key exchange running normally (the IDS-layer
# 4-service identity is unaffected, so peer reshare eligibility is kept).
statuskit_notifications: true

# DEVELOPMENT ONLY — leave this false in any real deployment.
# Reverts the bridge's privacy protections so plaintext is observable for
# debugging. When true:
#   1. Logs are NOT anonymized — raw iMessage handles (phone/email) and full
#      URLs appear verbatim instead of opaque tokens / scheme+host forms.
#   2. The periodic body scrubber is disabled — plaintext message bodies
#      cached locally (in the cloud_message table of mautrix-imessage.db)
#      are no longer cleared after delivery to Matrix, so they persist.
#   3. On the next CloudKit sync, rows that were already scrubbed are
#      re-filled: the scrub flags are cleared and the CloudKit sync tokens
#      are reset, forcing a full re-page that re-downloads the plaintext.
# Only the CloudKit backfill source caches plaintext locally, so effects 2
# and 3 are CloudKit-specific. Does NOT undo deletes/unsends, and does NOT
# re-deliver anything to Matrix.
debug_disable_privacy: false

# Send read receipts to iMessage contacts when you read their messages in
# Matrix. Set to false to stop iMessage contacts seeing when you have read
# their messages. Incoming read receipts from iMessage contacts are unaffected.
read_receipts: true

# Send typing indicators to iMessage contacts while you compose a reply in
# Matrix. Set to false to hide your typing from iMessage contacts. Incoming
# typing indicators from iMessage contacts are unaffected.
typing_notifications: true

# External CardDAV server for contact name resolution.
# Works with Google (app passwords), Nextcloud, Radicale, Fastmail, etc.
# When configured, this is used instead of iCloud contacts.
# Set up during install or via: ./mautrix-imessage-v2 carddav-setup
carddav:
    # Email address — used for auto-discovery and as default username.
    email: ""
    # CardDAV server URL. Leave empty to auto-discover from email.
    url: ""
    # Username for authentication (defaults to email if empty).
    username: ""
    # Encrypted app password (set by carddav-setup command).
    password_encrypted: ""

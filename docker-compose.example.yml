# ============================================================================
# Rustpush-Matrix — Docker compose example.
#
# Edit the two values below for your host:
#   - The bind mount (volumes)  — pick your appdata path
#   - BEEPER                    — "true" for Beeper, "false" for self-hosted
#
# The host data directory MUST be owned by the UID:GID the container
# runs as. By default that's 1000:1000 (the typical first Linux user).
# Run `imessage fix-perms` once after creating the dir if you're not
# sure — it walks you through the chown.
#
# Everything else (CardDAV, FaceTime toggle, StatusKit, HEIC, video
# transcoding, preferred handle, …) is configured through the
# interactive `imessage setup` wizard and persisted in config.yaml on
# the bind mount. Compose stays minimal on purpose.
# ============================================================================

services:
  Rustpush-Matrix:
    image: ghcr.io/lrhodin/imessage:latest
    container_name: Rustpush-Matrix
    restart: unless-stopped
    stdin_open: true
    tty: true

    volumes:
      # HOST path is your choice — the container only cares about /data.
      # Standard Linux desktop:  ~/.local/share/mautrix-imessage
      # UNRAID:                  /mnt/user/appdata/Rustpush-Matrix
      # Synology:                /volume1/docker/Rustpush-Matrix
      # TrueNAS Scale:           a dataset of your choice
      - ~/.local/share/mautrix-imessage:/data

    environment:
      # Which homeserver are you connecting to?
      #   "true"  — Beeper
      #   "false" — self-hosted Synapse / Dendrite / Conduit
      BEEPER: "true"

    # UID:GID the container runs as. Default 1000:1000 (the bundled
    # bridge user in the image). Uncomment + edit ONLY if your host
    # appdata directory is owned by something else.
    #
    # Common overrides:
    #   user: "99:100"     # UNRAID (nobody:users)
    #   user: "568:568"    # TrueNAS Scale (apps)
    #   user: "0:0"        # root (discouraged; only if you must)
    #
    # Whatever UID:GID you pick, the host data directory above must be
    # chowned to match. `imessage fix-perms` does that interactively.
    # user: "1000:1000"

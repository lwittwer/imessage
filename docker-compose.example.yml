# ============================================================================
# Rustpush-Matrix — Docker compose example.
#
# Edit the three values below for your host:
#   - The bind mount (volumes)  — pick your appdata path
#   - PUID / PGID               — match the user that owns the bind mount
#   - BEEPER                    — "true" for Beeper, "false" for self-hosted
#
# Everything else (CardDAV, FaceTime toggle, StatusKit, HEIC conversion,
# video transcoding, preferred handle, …) is configured through the
# interactive `imessage setup` wizard and persisted in config.yaml on
# the bind mount. Compose env vars stay minimal on purpose.
# ============================================================================

services:
  Rustpush-Matrix:
    image: ghcr.io/lrhodin/imessage:latest
    container_name: Rustpush-Matrix
    restart: unless-stopped
    stdin_open: true
    tty: true

    volumes:
      # HOST path is your choice — the container only cares about /data.
      # Standard Linux desktop:  ~/.local/share/mautrix-imessage
      # UNRAID:                  /mnt/user/appdata/Rustpush-Matrix
      # Synology:                /volume1/docker/Rustpush-Matrix
      # TrueNAS Scale:           a dataset of your choice
      # If the path doesn't exist on the host, Docker creates it on
      # first start and the entrypoint chowns it to PUID:PGID.
      - ~/.local/share/mautrix-imessage:/data

    environment:
      # Which homeserver are you connecting to?
      #   "true"  — Beeper
      #   "false" — self-hosted Synapse / Dendrite / Conduit
      BEEPER: "true"

      # UID and GID the bridge runs as. MUST match whoever owns the
      # bind-mount directory above, or the container won't be able to
      # read/write your state files.
      #
      # Look up your values on the HOST:
      #     id -u                                       # your UID
      #     id -g                                       # your GID
      #     stat -c '%u:%g' /your/appdata/path          # what owns the dir
      #
      # Typical values: 1000:1000 (first Linux user), 99:100 (UNRAID).
      # See docs/docker.md → "Finding your UID and GID" for more.
      PUID: "1000"
      PGID: "1000"

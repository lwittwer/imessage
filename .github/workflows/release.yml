name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────────
  # Run the full test suite before releasing
  # ───────────────────────────────────────────────────────────────
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install libolm-dev
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libolm-dev

      - name: Test imessage/
        run: go test -v -count=1 ./imessage/...

      # pkg/connector/ tests require the Rust lib – they run in the build jobs

  # ───────────────────────────────────────────────────────────────
  # Build macOS universal binary + app bundle
  # ───────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (arm64)
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: brew install libolm protobuf

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/rustpushgo/target
          key: cargo-release-macos-arm64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-release-macos-arm64-

      - name: Build
        run: make build

      - name: Test pkg/connector/
        env:
          CGO_CFLAGS: -I/opt/homebrew/include
          CGO_LDFLAGS: -L/opt/homebrew/lib
        run: go test -v -count=1 ./pkg/connector/...

      - name: Create tarball
        run: |
          tar czf mautrix-imessage-v2-macos-arm64.tar.gz \
            mautrix-imessage-v2.app/ bbctl \
            scripts/install.sh scripts/install-beeper.sh scripts/reset-bridge.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: mautrix-imessage-v2-macos-arm64.tar.gz

  # ───────────────────────────────────────────────────────────────
  # Build Linux amd64 binary
  # ───────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake pkg-config git curl \
            libolm-dev libclang-dev libssl-dev libunicorn-dev \
            protobuf-compiler sqlite3

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/rustpushgo/target
          key: cargo-release-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-release-linux-

      - name: Build
        run: make build

      - name: Create tarball
        run: |
          tar czf mautrix-imessage-v2-linux-amd64.tar.gz \
            mautrix-imessage-v2 bbctl \
            scripts/install-linux.sh scripts/install-beeper-linux.sh \
            scripts/bootstrap-linux.sh scripts/reset-bridge.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: mautrix-imessage-v2-linux-amd64.tar.gz

  # ───────────────────────────────────────────────────────────────
  # Build extract-key tool (macOS only)
  # ───────────────────────────────────────────────────────────────
  build-extract-key:
    name: Build extract-key (macOS)
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/extract-key/go.mod
          check-latest: true

      - name: Build extract-key
        run: make extract-key

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extract-key-macos
          path: extract-key

  # ───────────────────────────────────────────────────────────────
  # Create GitHub Release
  # ───────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-linux, build-extract-key]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "## Changes" > changelog.md
          echo "" >> changelog.md
          git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> changelog.md
          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "## Checksums" >> changelog.md
          echo '```' >> changelog.md
          sha256sum artifacts/**/*.tar.gz artifacts/**//extract-key >> changelog.md
          echo '```' >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/mautrix-imessage-v2-macos-arm64.tar.gz
            artifacts/linux-amd64/mautrix-imessage-v2-linux-amd64.tar.gz
            artifacts/extract-key-macos/extract-key

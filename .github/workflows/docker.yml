# ============================================================================
# docker.yml — build + push the mautrix-imessage-v2 image to GHCR.
#
# Manual dispatch ONLY. Each arch builds natively on its own hosted runner
# (ubuntu-latest for amd64, ubuntu-24.04-arm for arm64 — both free on
# public repos), then a small merge job stitches the per-arch digests into
# one multi-arch manifest under the requested tags. Avoids the ~2 h QEMU
# emulation cost the previous all-in-one job paid for arm64. Cold runs
# land around ~10 min; warm runs ~5 min.
#
# After the first successful push, set the GHCR package visibility to
# Public via the GitHub UI (one-time): Package settings → Change visibility.
# ============================================================================

name: docker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to apply to the published image (in addition to :sha-<short>). Leave empty for none."
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write   # required to push to ghcr.io/lrhodin/*

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/lrhodin/imessage

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            # scope bumped to -v2 to bust a poisoned gha layer cache: a bad
            # Unicorn (NAC emulator) build got committed to the cached compile
            # layer and was being restored on every layered build ("Could not
            # allocate dynamic translator buffer" at NAC start). The bump forces
            # one fresh compile so a known-good librustpushgo.a re-populates the
            # cache. Bump again if the unicorn/rustpush build is ever poisoned.
            scope: linux-amd64-v2
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            scope: linux-arm64-v2
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # push-by-digest=true: each per-arch job uploads its image blob to
      # GHCR keyed only by digest (no tags). The merge job below assembles
      # those digests into a tagged multi-arch manifest. name-canonical
      # ensures the pushed name matches IMAGE exactly so imagetools can
      # reference it by `IMAGE@sha256:...` afterwards.
      #
      # provenance: false — build-push-action@v6's default SLSA provenance
      # attestation makes each per-arch push land as an OCI index (image
      # manifest + attestation manifest). `steps.build.outputs.digest`
      # would then point at that index, and `imagetools create` would
      # build a manifest list of indexes, which some runtimes pull oddly.
      # The Docker docs' multi-runner example disables provenance here for
      # exactly this reason. The old single-job workflow had provenance
      # on, so dropping it isn't a regression worth defending.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.scope }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest & push tags
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG_ARGS="-t ${IMAGE}:sha-${SHORT_SHA}"
          EXTRA="${{ inputs.tag }}"
          if [ -n "$EXTRA" ]; then
            TAG_ARGS="$TAG_ARGS -t ${IMAGE}:${EXTRA}"
          fi
          echo "tag_args=$TAG_ARGS" >> "$GITHUB_OUTPUT"
          echo "Will push: $TAG_ARGS"

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # Reliability guard: never stitch a single-arch manifest. The build
          # matrix has 2 platforms and merge runs only when BOTH legs succeed
          # (needs: build), so there must be exactly 2 per-arch digests here.
          # If not, abort rather than publish a partial :latest that would make
          # amd64 hosts pull arm64 (or vice versa) and run under QEMU emulation.
          count=$(ls -1 | wc -l)
          if [ "$count" -ne 2 ]; then
            echo "::error::Expected 2 per-arch digests, found $count — refusing to publish a partial (single-arch) manifest."
            ls -la
            exit 1
          fi
          docker buildx imagetools create ${{ steps.tags.outputs.tag_args }} \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Verify every published tag is multi-arch
        run: |
          # Belt-and-suspenders: confirm each tag we just pushed resolves to
          # BOTH linux/amd64 and linux/arm64. A missing arch means a wrong-arch
          # tag is live — fail loudly instead of silently shipping a bad :latest.
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="${IMAGE}:sha-${SHORT_SHA}"
          EXTRA="${{ inputs.tag }}"
          [ -n "$EXTRA" ] && TAGS="$TAGS ${IMAGE}:${EXTRA}"
          fail=0
          for tag in $TAGS; do
            echo "──────── $tag ────────"
            out=$(docker buildx imagetools inspect "$tag")
            echo "$out"
            echo "$out" | grep -q "linux/amd64" || { echo "::error::$tag is missing linux/amd64"; fail=1; }
            echo "$out" | grep -q "linux/arm64" || { echo "::error::$tag is missing linux/arm64"; fail=1; }
          done
          [ "$fail" -eq 0 ] || exit 1

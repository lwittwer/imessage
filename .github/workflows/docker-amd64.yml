# ============================================================================
# docker-amd64.yml — fast amd64-only image build for quick test tags.
#
# Manual dispatch ONLY. Same Dockerfile + same publish target as the main
# `docker` workflow, but linux/amd64 only — skips the QEMU step so cold
# builds finish in ~5-7 min instead of ~25-30 min. Use this when you just
# want a quick test tag against a branch fix, not a release.
#
# The default tag is `test` (not `latest`) so accidental runs don't bump
# the latest pointer that production users follow. Override or clear the
# input in the Run workflow dialog as needed.
# ============================================================================

name: docker-amd64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to apply to the published image (in addition to :sha-<short>). Default :test to avoid bumping :latest. Leave empty for none."
        required: false
        default: "test"

permissions:
  contents: read
  packages: write   # required to push to ghcr.io/lrhodin/*

concurrency:
  group: docker-amd64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push image (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          IMAGE=ghcr.io/lrhodin/imessage
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="$IMAGE:sha-$SHORT_SHA"
          EXTRA="${{ inputs.tag }}"
          if [ -n "$EXTRA" ]; then
            TAGS="$TAGS,$IMAGE:$EXTRA"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Will push: $TAGS"

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # amd64 only — no QEMU, no arm64. Shares the GHA cache namespace
          # with the multi-arch `docker` workflow so warm builds reuse the
          # rustpush + cargo + go layers either way.
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

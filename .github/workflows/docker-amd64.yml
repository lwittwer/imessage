# ============================================================================
# docker-amd64.yml — fast amd64-only image build for quick test tags.
#
# Manual dispatch ONLY. Same Dockerfile + same publish target as the main
# `docker` workflow, but linux/amd64 only — skips the QEMU step so cold
# builds finish in ~5-7 min instead of ~25-30 min. Use this when you just
# want a quick test tag against a branch fix, not a release.
#
# No default tag — required input, so every run forces you to type the
# tag explicitly. Prevents accidental bumps of :latest or stale :test
# overwrites of a previous test image you still care about.
# ============================================================================

name: docker-amd64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to apply to the published image (in addition to :sha-<short>). Required — type a tag like `test`, `mybranch`, etc. Do NOT type `latest` unless you mean to bump production."
        required: true

permissions:
  contents: read
  packages: write   # required to push to ghcr.io/lrhodin/*

concurrency:
  group: docker-amd64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push image (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Boot BuildKit from Google's Docker Hub pull-through mirror instead
          # of registry-1.docker.io, and route in-build base-image pulls through
          # the same mirror. Docker Hub's unauthenticated endpoint intermittently
          # times out on hosted runners ("booting buildkit: Get
          # https://registry-1.docker.io/v2/: context deadline exceeded").
          driver-opts: image=mirror.gcr.io/moby/buildkit:buildx-stable-1
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          IMAGE=ghcr.io/lrhodin/imessage
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="$IMAGE:sha-$SHORT_SHA"
          EXTRA="${{ inputs.tag }}"
          if [ -n "$EXTRA" ]; then
            TAGS="$TAGS,$IMAGE:$EXTRA"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Will push: $TAGS"

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # amd64 only — no QEMU, no arm64. Shares the `linux-amd64-v2` GHA
          # cache scope with the multi-arch `docker` workflow's amd64 matrix
          # leg so warm builds reuse the rustpush + cargo + go layers either
          # way. The -v2 suffix busts the poisoned pre-existing cache that was
          # restoring a bad Unicorn (NAC emulator) build — keep both workflows'
          # scopes in lockstep so neither repoisons the other.
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=linux-amd64-v2
          cache-to: type=gha,mode=max,scope=linux-amd64-v2

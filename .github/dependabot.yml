version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps(go):"

  - package-ecosystem: cargo
    directory: /pkg/rustpushgo
    schedule:
      interval: weekly
    groups:
      rust-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps(rust):"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci:"
